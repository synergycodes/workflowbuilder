packages:
  - './apps/*'
  - './packages/*'

catalog:
  '@base-ui/react': ^1.4.0
  '@phosphor-icons/core': ^2.1.1
  '@phosphor-icons/react': ^2.1.7
  '@xyflow/react': 12.10.0
  # Exact-pinned (no caret): React 19 hard-requires react and react-dom to be
